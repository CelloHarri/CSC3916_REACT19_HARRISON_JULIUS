services:
  - type: web
    name: csc3916-react19
    env: static
    buildCommand: npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false   # Set this manually in the Render dashboard to your HW3 API URL
